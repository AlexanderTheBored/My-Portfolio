  <!-- SCHEDULE WIDGET -->

  <div id="schedule-widget">

    <div class="sw-titlebar" onmousedown="startWidgetDrag(event)">

      <div class="sw-title"><span class="sw-blink"></span>&nbsp;LIVE SCHEDULE</div>

      <div style="display:flex;gap:2px;align-items:center;">

        <span class="sw-ctrl-btn" onclick="toggleWidgetMode()" id="sw-mode-btn" title="Expand">&#x229F;</span>

        <span class="sw-ctrl-btn" onclick="openWindow('win-schedule')" title="Full schedule">&#x229E;</span>

      </div>

    </div>

    <div id="sw-compact">

      <div class="sw-body">

        <div id="sw-content-now">

          <div class="sw-row">

            <span class="sw-label">NOW</span>

            <span class="sw-value" id="sw-code">--</span>

          </div>

          <span class="sw-room" id="sw-room"></span>

          <div class="sw-divider"></div>

          <div class="sw-next-row">

            <span class="sw-next-label" id="sw-next-label">UP NEXT</span>

            <span class="sw-next-val" id="sw-next-val">--</span>

          </div>

          <div class="sw-next-row">

            <span class="sw-next-label" id="sw-eta-label">ETA</span>

            <span class="sw-next-val" id="sw-eta">--</span>

          </div>

        </div>

        <div class="sw-free" id="sw-free" style="display:none;">No class right now</div>

      </div>

    </div>

    <div id="sw-big">

      <div class="sw-clock-wrap">

        <canvas id="sw-clock-canvas" width="100" height="100"></canvas>

        <div class="sw-digital" id="sw-digital-time">00:00:00</div>

        <div class="sw-digital-ampm" id="sw-digital-ampm">AM</div>

      </div>

      <div class="sw-divider" style="margin:0 8px 4px;"></div>

      <div class="sw-day-list" id="sw-day-list"></div>

    </div>

    <div class="sw-statusbar">

      <span>2nd Sem AY 2025</span>

      <span id="sw-time">--:--</span>

    </div>

  </div>






<script>
// ===================== WIDGET MODE TOGGLE =====================

var widgetBig = false;

var clockRaf = null;



function toggleWidgetMode() {

  widgetBig = !widgetBig;

  var w = document.getElementById('schedule-widget');

  var btn = document.getElementById('sw-mode-btn');

  w.classList.toggle('big-mode', widgetBig);

  btn.textContent = widgetBig ? '⊟' : '⊡';

  btn.title = widgetBig ? 'Collapse' : 'Expand';

  if (widgetBig) {

    startClock();

    renderDayList();

  } else {

    if (clockRaf) { cancelAnimationFrame(clockRaf); clockRaf = null; }

  }

  pinWidget();

}



// ── Analog clock ──

function startClock() {

  function frame() {

    drawClock();

    clockRaf = requestAnimationFrame(frame);

  }

  if (clockRaf) cancelAnimationFrame(clockRaf);

  clockRaf = requestAnimationFrame(frame);

}



function drawClock() {

  var canvas = document.getElementById('sw-clock-canvas');

  if (!canvas) return;

  var ctx = canvas.getContext('2d');

  var W = canvas.width, H = canvas.height;

  var cx = W/2, cy = H/2, r = W/2 - 4;

  var now = new Date();

  var hr = now.getHours(), min = now.getMinutes(), sec = now.getSeconds();



  // Update digital display

  var dig = document.getElementById('sw-digital-time');

  var ampm = document.getElementById('sw-digital-ampm');

  if (dig) {

    var h12 = hr % 12 || 12;

    dig.textContent = String(h12).padStart(2,'0') + ':' + String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');

  }

  if (ampm) ampm.textContent = hr < 12 ? 'AM' : 'PM';



  ctx.clearRect(0, 0, W, H);



  // Face — Win95 sunken inset look

  ctx.fillStyle = '#ffffff';

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

  // outer border

  ctx.strokeStyle = '#808080'; ctx.lineWidth = 2;

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;

  ctx.beginPath(); ctx.arc(cx, cy, r-2, 0, Math.PI*2); ctx.stroke();



  // Hour ticks (pixelated — draw as rects)

  ctx.fillStyle = '#000080';

  for (var i = 0; i < 12; i++) {

    var a = (i / 12) * Math.PI * 2 - Math.PI/2;

    var len = i % 3 === 0 ? 6 : 3;

    var x1 = cx + Math.cos(a) * (r-4);

    var y1 = cy + Math.sin(a) * (r-4);

    var x2 = cx + Math.cos(a) * (r-4-len);

    var y2 = cy + Math.sin(a) * (r-4-len);

    ctx.beginPath();

    ctx.lineWidth = i % 3 === 0 ? 2 : 1;

    ctx.strokeStyle = '#000080';

    ctx.moveTo(Math.round(x1), Math.round(y1));

    ctx.lineTo(Math.round(x2), Math.round(y2));

    ctx.stroke();

  }



  // Hour hand

  var haAngle = ((hr % 12) + min/60) / 12 * Math.PI*2 - Math.PI/2;

  drawHand(ctx, cx, cy, haAngle, r*0.5, 3, '#000080');



  // Minute hand

  var maAngle = (min + sec/60) / 60 * Math.PI*2 - Math.PI/2;

  drawHand(ctx, cx, cy, maAngle, r*0.72, 2, '#000080');



  // Second hand

  var saAngle = sec / 60 * Math.PI*2 - Math.PI/2;

  drawHand(ctx, cx, cy, saAngle, r*0.78, 1, '#cc0000');



  // Center dot

  ctx.fillStyle = '#000080';

  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#cc0000';

  ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI*2); ctx.fill();

}



function drawHand(ctx, cx, cy, angle, length, width, color) {

  ctx.save();

  ctx.strokeStyle = color;

  ctx.lineWidth = width;

  ctx.lineCap = 'square';

  ctx.beginPath();

  ctx.moveTo(cx, cy);

  ctx.lineTo(

    Math.round(cx + Math.cos(angle) * length),

    Math.round(cy + Math.sin(angle) * length)

  );

  ctx.stroke();

  ctx.restore();

}



// ── Day schedule list ──

function renderDayList() {

  var list = document.getElementById('sw-day-list');

  if (!list) return;

  var now = new Date();

  var day = now.getDay();

  var mins = now.getHours()*60 + now.getMinutes();



  var todayClasses = schedule.filter(function(s) {

    return s.days.indexOf(day) !== -1;

  }).sort(function(a,b) { return toMins(a.start) - toMins(b.start); });



  if (todayClasses.length === 0) {

    list.innerHTML = '<div class="sw-noclass-big">✓ No classes today!</div>';

    return;

  }



  list.innerHTML = todayClasses.map(function(s) {

    var st = toMins(s.start), en = toMins(s.end);

    var cls = '';

    if (mins >= st && mins < en) cls = 'sw-current-class';

    else if (mins >= en) cls = 'sw-done-class';

    return '<div class="sw-day-row ' + cls + '">' +

      '<span class="sw-day-code">' + s.code + '</span>' +

      '<span class="sw-day-time">' + s.start + '–' + s.end + '</span>' +

      '<span class="sw-day-room">' + s.room + '</span>' +

    '</div>';

  }).join('');

}



// Re-render day list every minute in big mode

setInterval(function() { if (widgetBig) renderDayList(); }, 60000);



// ===================== WIDGET DRAG (isolated — no resize) =====================

function pinWidget() {

  var el = document.getElementById('schedule-widget');

  if (!el) return;

  el.style.right = '0px';

  el.style.bottom = '36px';

  el.style.left = 'auto';

  el.style.top = 'auto';

}



var widgetDrag = null;



function startWidgetDrag(e) {

  if (e.button !== 0) return;

  var el = document.getElementById('schedule-widget');

  var rect = el.getBoundingClientRect();

  // Convert from right/bottom to top/left for drag

  el.style.left   = rect.left + 'px';

  el.style.top    = rect.top  + 'px';

  el.style.right  = 'auto';

  el.style.bottom = 'auto';

  widgetDrag = { ox: e.clientX - rect.left, oy: e.clientY - rect.top };

  e.preventDefault();

  e.stopPropagation();

}

window.addEventListener('mousemove', function(e) {

  if (!widgetDrag) return;

  var el = document.getElementById('schedule-widget');

  if (!el) return;

  var x = Math.max(0, Math.min(window.innerWidth  - el.offsetWidth,  e.clientX - widgetDrag.ox));

  var y = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, e.clientY - widgetDrag.oy));

  el.style.left = x + 'px';

  el.style.top  = y + 'px';

});

window.addEventListener('mouseup', function() { widgetDrag = null; });



// ===================== WINDOW MANAGER =====================

</script>
