<script>
// ===================== LIVE WEATHER (Mandaue City) =====================

// Uses Open-Meteo — free, no API key, coordinates for Mandaue City PH

// ===================== WEATHER ENGINE =====================

function fetchWeather() {

  var url = 'https://api.open-meteo.com/v1/forecast' +

    '?latitude=10.3236&longitude=123.9223' +

    '&current=temperature_2m,weathercode,is_day' +

    '&timezone=Asia%2FManila&forecast_days=1';

  fetch(url)

    .then(function(r) { return r.json(); })

    .then(function(data) {

      var c = data.current;

      applyWeather(c.weathercode, Math.round(c.temperature_2m), c.is_day);

    })

    .catch(function() {});

}



function applyWeather(code, temp, isDay) {

  var body = document.body;

  // Remove ALL previous weather + sky classes

  ['wx-clear','wx-cloudy','wx-overcast','wx-rain','wx-storm','wx-night','wx-fog',

   'sky-day','sky-night'].forEach(function(cl){ body.classList.remove(cl); });



  var icon, label, wxClass;

  if      (code === 0)  { wxClass = 'wx-clear';    icon = isDay ? '☀️' : '🌙';        label = isDay ? 'Clear' : 'Clear Night'; }

  else if (code <= 2)   { wxClass = 'wx-cloudy';   icon = isDay ? '⛅'      : '🌙☁️'; label = 'Cloudy'; }

  else if (code === 3)  { wxClass = 'wx-overcast'; icon = '☁️';                              label = 'Overcast'; }

  else if (code <= 49)  { wxClass = 'wx-fog';      icon = '🌫️';                          label = 'Foggy'; }

  else if (code <= 67)  { wxClass = 'wx-rain';     icon = '🌧️';                          label = 'Rain'; }

  else if (code <= 77)  { wxClass = 'wx-rain';     icon = '🌨️';                          label = 'Sleet'; }

  else if (code <= 82)  { wxClass = 'wx-rain';     icon = '🌦️';                          label = 'Showers'; }

  else if (code <= 99)  { wxClass = 'wx-storm';    icon = '⛈️';                              label = 'Storm'; }

  else                  { wxClass = 'wx-cloudy';   icon = '🌤️';                          label = 'Partly Cloudy'; }



  // Apply weather class + day/night class

  body.classList.add(wxClass);

  body.classList.add(isDay ? 'sky-day' : 'sky-night');

  // Legacy class so old canvas checks still work

  if (!isDay) body.classList.add('wx-night');



  // Update badge

  var badge = document.getElementById('wx-badge');

  if (badge) badge.textContent = icon + ' ' + temp + '°C · ' + label + (isDay ? '' : ' (Night)') + ' · Mandaue';



  // CSS pixel clouds

  var clouds = document.querySelectorAll('.pixel-cloud');

  var showCount = (wxClass === 'wx-fog') ? 0 : (wxClass === 'wx-clear') ? (isDay ? 2 : 1) : 7;

  clouds.forEach(function(cl, i) { cl.style.opacity = i < showCount ? '1' : '0'; });



  // Canvas particle engine

  startWxCanvas(wxClass, isDay);

}



// ── CANVAS WEATHER PARTICLES ──

var WX_RAF = null;

var WX_PARTICLES = [];

var WX_LIGHTNING = { timer:0, next:0 };

var WX_MODE = 'wx-clear';

var WX_STARS = [];



function startWxCanvas(mode, isDay) {

  WX_MODE = mode;

  WX_PARTICLES = [];

  WX_STARS = [];

  WX_LIGHTNING = { timer:0, next:200 + Math.random()*300 };

  var canvas = document.getElementById('wx-canvas');

  if (!canvas) return;

  canvas.width  = window.innerWidth;

  canvas.height = window.innerHeight;

  if (WX_RAF) { cancelAnimationFrame(WX_RAF); WX_RAF = null; }

  if (mode === 'wx-clear') {

    clearWxCanvas(); drawClearOverlay(canvas);

    if (!isDay) startNightLoop(canvas);

    return;

  }

  if (mode === 'wx-cloudy' || mode === 'wx-overcast') {

    clearWxCanvas(); startCloudyLoop(canvas, isDay); return;

  }

  if (mode === 'wx-fog') {

    clearWxCanvas(); startFogLoop(canvas, isDay); return;

  }

  if (mode === 'wx-night') {

    clearWxCanvas(); startNightLoop(canvas); return;

  }

  function loop() {

    var ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (mode === 'wx-storm') drawStormOverlay(ctx, canvas);

    spawnRain(mode, canvas);

    drawRain(ctx, canvas, mode);

    if (mode === 'wx-storm') handleLightning(ctx, canvas);

    WX_RAF = requestAnimationFrame(loop);

  }

  WX_RAF = requestAnimationFrame(loop);

}



function clearWxCanvas() {

  var canvas = document.getElementById('wx-canvas');

  if (!canvas) return;

  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

}



// CLEAR: warm sun glare top-right

function drawClearOverlay(canvas) {

  var ctx = canvas.getContext('2d');

  var W = canvas.width, H = canvas.height;

  var g = ctx.createRadialGradient(W*0.87, 40, 0, W*0.87, 40, W*0.55);

  g.addColorStop(0,   'rgba(255,245,120,0.16)');

  g.addColorStop(0.4, 'rgba(255,210,60,0.06)');

  g.addColorStop(1,   'rgba(255,200,50,0)');

  ctx.fillStyle = g;

  ctx.fillRect(0, 0, W, H);

}



// CLOUDY: animated canvas wisps drifting across

function startCloudyLoop(canvas, isDay) {

  for (var i = 0; i < 9; i++) WX_PARTICLES.push(makeCanvasCloud(canvas, true));

  function loop() {

    var ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = 'rgba(150,160,190,0.05)';

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (WX_PARTICLES.length < 11 && Math.random() < 0.007)

      WX_PARTICLES.push(makeCanvasCloud(canvas, false));

    for (var i = WX_PARTICLES.length-1; i >= 0; i--) {

      var p = WX_PARTICLES[i];

      p.x += p.vx;

      if (p.x > canvas.width + p.r * p.stretch + 100) { WX_PARTICLES.splice(i,1); continue; }

      drawCloudWisp(ctx, p);

    }

    WX_RAF = requestAnimationFrame(loop);

  }

  WX_RAF = requestAnimationFrame(loop);

}

function makeCanvasCloud(canvas, scatter) {

  return { x: scatter ? Math.random()*canvas.width : -220-Math.random()*200,

    y: 20 + Math.random()*canvas.height*0.42,

    vx: 0.15+Math.random()*0.28, r: 90+Math.random()*150,

    alpha: 0.07+Math.random()*0.09, stretch: 1.9+Math.random()*1.4 };

}

function drawCloudWisp(ctx, p) {

  ctx.save(); ctx.globalAlpha = p.alpha;

  var g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

  g.addColorStop(0,   'rgba(225,230,250,1)');

  g.addColorStop(0.55,'rgba(210,218,240,0.5)');

  g.addColorStop(1,   'rgba(200,210,235,0)');

  ctx.fillStyle = g;

  ctx.save(); ctx.scale(p.stretch,1);

  ctx.beginPath(); ctx.arc(p.x/p.stretch,p.y,p.r,0,Math.PI*2); ctx.fill();

  ctx.restore(); ctx.restore();

}



// FOG: layered undulating fog banks

function startFogLoop(canvas, isDay) {

  for (var i = 0; i < 16; i++) WX_PARTICLES.push(makeFogLayer(canvas, true));

  function loop() {

    var ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = isDay ? 'rgba(175,180,200,0.09)' : 'rgba(20,22,40,0.18)';

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (WX_PARTICLES.length < 18 && Math.random() < 0.04)

      WX_PARTICLES.push(makeFogLayer(canvas, false));

    for (var i = WX_PARTICLES.length-1; i >= 0; i--) {

      var p = WX_PARTICLES[i];

      p.x += p.vx;

      p.y += Math.sin(performance.now()*0.0003 + p.phase)*0.12;

      p.alpha += p.alphaDir*0.0004;

      if (p.alpha > p.alphaMax) p.alphaDir = -1;

      if (p.alpha < 0.005) { WX_PARTICLES.splice(i,1); continue; }

      if (p.x > canvas.width + p.rw + 100) { WX_PARTICLES.splice(i,1); continue; }

      drawFogLayer(ctx, p);

    }

    var veil = ctx.createLinearGradient(0,0,0,canvas.height*0.55);

    veil.addColorStop(0,   'rgba(185,190,215,0.28)');

    veil.addColorStop(0.35,'rgba(185,190,215,0.10)');

    veil.addColorStop(1,   'rgba(185,190,215,0)');

    ctx.fillStyle = veil; ctx.fillRect(0,0,canvas.width,canvas.height*0.55);

    WX_RAF = requestAnimationFrame(loop);

  }

  WX_RAF = requestAnimationFrame(loop);

}

function makeFogLayer(canvas, scatter) {

  var yBands = [0.08,0.2,0.35,0.5,0.65,0.78,0.90];

  var band = yBands[Math.floor(Math.random()*yBands.length)];

  return { x: scatter ? Math.random()*canvas.width : -450,

    y: canvas.height*band + (Math.random()-0.5)*50,

    vx: 0.1+Math.random()*0.2, rw: 280+Math.random()*240, rh: 55+Math.random()*70,

    alpha: 0.04+Math.random()*0.07, alphaMax: 0.07+Math.random()*0.09,

    alphaDir: 1, phase: Math.random()*Math.PI*2 };

}

function drawFogLayer(ctx, p) {

  ctx.save(); ctx.globalAlpha = p.alpha;

  var g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.rw);

  g.addColorStop(0,  'rgba(210,215,232,1)');

  g.addColorStop(0.5,'rgba(200,207,228,0.55)');

  g.addColorStop(1,  'rgba(195,202,225,0)');

  ctx.fillStyle = g; ctx.scale(1, p.rh/p.rw);

  ctx.beginPath(); ctx.arc(p.x, p.y*(p.rw/p.rh), p.rw, 0, Math.PI*2); ctx.fill();

  ctx.restore();

}



// NIGHT: twinkling stars + shooting stars + moon glow

function startNightLoop(canvas) {

  var W = canvas.width, H = canvas.height;

  WX_STARS = [];

  for (var i = 0; i < 190; i++) {

    WX_STARS.push({ x: Math.random()*W, y: Math.random()*H*0.68,

      r: 0.35+Math.random()*1.5, base: 0.25+Math.random()*0.72,

      phase: Math.random()*Math.PI*2, speed: 0.01+Math.random()*0.022,

      col: Math.random()>0.82 ? '#ffeeaa' : (Math.random()>0.65 ? '#aaccff' : '#ffffff') });

  }

  var shooting = [], shootTimer = 0, shootNext = 200+Math.random()*450;

  function loop() {

    var ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, W, H);

    var mx = W*0.78, my = H*0.11;

    var mg = ctx.createRadialGradient(mx,my,0,mx,my,130);

    mg.addColorStop(0,   'rgba(255,252,225,0.20)');

    mg.addColorStop(0.35,'rgba(230,240,255,0.08)');

    mg.addColorStop(1,   'rgba(200,220,255,0)');

    ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);

    var t = performance.now()*0.001;

    for (var i = 0; i < WX_STARS.length; i++) {

      var s = WX_STARS[i];

      var a = s.base*(0.5+0.5*Math.sin(t*s.speed*60+s.phase));

      ctx.globalAlpha = a; ctx.fillStyle = s.col;

      if (s.r > 1.0) {

        ctx.fillRect(Math.round(s.x)-Math.round(s.r), Math.round(s.y), Math.round(s.r)*2, 1);

        ctx.fillRect(Math.round(s.x), Math.round(s.y)-Math.round(s.r), 1, Math.round(s.r)*2);

      }

      ctx.beginPath();

      ctx.arc(s.x, s.y, s.r*(0.65+0.35*Math.sin(t*s.speed*38+s.phase+1)), 0, Math.PI*2);

      ctx.fill();

    }

    ctx.globalAlpha = 1;

    shootTimer++;

    if (shootTimer >= shootNext) {

      shootTimer = 0; shootNext = 240+Math.random()*500;

      var spd = 5+Math.random()*5, ang = 0.25+Math.random()*0.35;

      shooting.push({ x:Math.random()*W*0.6, y:Math.random()*H*0.28,

        vx:spd*Math.cos(ang), vy:spd*Math.sin(ang), life:1, len:55+Math.random()*70 });

    }

    for (var i = shooting.length-1; i >= 0; i--) {

      var sh = shooting[i];

      sh.x += sh.vx; sh.y += sh.vy; sh.life -= 0.026;

      if (sh.life <= 0 || sh.x > W+50) { shooting.splice(i,1); continue; }

      var tx = sh.x - sh.vx*(sh.len/sh.vx), ty = sh.y - sh.vy*(sh.len/sh.vx);

      ctx.save(); ctx.globalAlpha = sh.life*0.9;

      var sg = ctx.createLinearGradient(tx,ty,sh.x,sh.y);

      sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(1,'rgba(255,255,235,0.95)');

      ctx.strokeStyle = sg; ctx.lineWidth = 1.5;

      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(sh.x,sh.y); ctx.stroke();

      ctx.globalAlpha = sh.life; ctx.fillStyle = '#fff';

      ctx.beginPath(); ctx.arc(sh.x,sh.y,1.5,0,Math.PI*2); ctx.fill();

      ctx.restore();

    }

    WX_RAF = requestAnimationFrame(loop);

  }

  WX_RAF = requestAnimationFrame(loop);

}



// RAIN

function spawnRain(mode, canvas) {

  var W = canvas.width, isStorm = mode==='wx-storm';

  var count = isStorm ? 15 : 7;

  var windX = isStorm ? -4.5+Math.random()*1.0 : -1.5+Math.random()*0.4;

  for (var i = 0; i < count; i++) {

    WX_PARTICLES.push({ type:'rain', x:Math.random()*(W+300)-100, y:-20-Math.random()*100,

      vx:windX, vy:isStorm?20+Math.random()*10:13+Math.random()*6,

      len:isStorm?20+Math.random()*14:10+Math.random()*8,

      alpha:isStorm?0.55+Math.random()*0.4:0.3+Math.random()*0.3,

      width:isStorm?1.5+Math.random()*0.5:1.0 });

  }

}

function drawStormOverlay(ctx, canvas) {

  ctx.fillStyle = 'rgba(15,15,35,0.20)';

  ctx.fillRect(0, 0, canvas.width, canvas.height);

}

function drawRain(ctx, canvas, mode) {

  var H = canvas.height, isStorm = mode==='wx-storm';

  var col = isStorm ? '#7aaae8' : '#88aacc';

  for (var i = WX_PARTICLES.length-1; i >= 0; i--) {

    var p = WX_PARTICLES[i];

    p.x += p.vx; p.y += p.vy;

    if (p.type === 'rain') {

      if (p.y > H+10) { WX_PARTICLES.splice(i,1); continue; }

      if (p.y > H-70) {

        for (var s=0; s<2; s++) WX_PARTICLES.push({ type:'splat', x:p.x, y:H-8,

          vx:(Math.random()-0.5)*4, vy:-0.8-Math.random()*2.5, alpha:0.6, r:1.8+Math.random()*2.2, life:1 });

        WX_PARTICLES.splice(i,1); continue;

      }

      ctx.save(); ctx.globalAlpha = p.alpha; ctx.strokeStyle = col; ctx.lineWidth = p.width;

      ctx.beginPath(); ctx.moveTo(p.x,p.y);

      ctx.lineTo(p.x+p.vx*(p.len/p.vy),p.y+p.len); ctx.stroke(); ctx.restore();

    } else if (p.type === 'splat') {

      p.life -= 0.065; if (p.life <= 0) { WX_PARTICLES.splice(i,1); continue; }

      p.x += p.vx*0.35; p.vy += 0.18; p.y += p.vy;

      ctx.save(); ctx.globalAlpha = p.life*0.5; ctx.fillStyle = col;

      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();

    }

  }

  if (WX_PARTICLES.length > 900) WX_PARTICLES.splice(0,80);

}



// LIGHTNING

function handleLightning(ctx, canvas) {

  WX_LIGHTNING.timer++;

  if (WX_LIGHTNING.timer >= WX_LIGHTNING.next) {

    WX_LIGHTNING.timer = 0;

    WX_LIGHTNING.next = 150+Math.random()*360;

    flashLightning(ctx, canvas);

    if (Math.random() > 0.5) setTimeout(function() {

      var c2 = document.getElementById('wx-canvas');

      if (c2) flashLightning(c2.getContext('2d'), c2);

    }, 90+Math.random()*90);

  }

}

function flashLightning(ctx, canvas) {

  var W = canvas.width, H = canvas.height;

  var bx = W*0.12+Math.random()*W*0.76;

  ctx.save();

  ctx.globalAlpha = 0.35; ctx.strokeStyle = '#88bbff';

  ctx.lineWidth = 7; ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 35;

  drawBolt(ctx, bx, 0, H*0.72, 95);

  ctx.globalAlpha = 1.0; ctx.strokeStyle = '#e8f4ff';

  ctx.lineWidth = 1.5; ctx.shadowBlur = 10;

  drawBolt(ctx, bx, 0, H*0.72, 65);

  ctx.restore();

  var desktop = document.getElementById('desktop');

  if (desktop) {

    desktop.style.filter = 'brightness(1.75)';

    setTimeout(function(){ desktop.style.filter=''; },55);

    setTimeout(function(){ desktop.style.filter='brightness(1.3)'; },95);

    setTimeout(function(){ desktop.style.filter=''; },160);

  }

}

function drawBolt(ctx, x, y, maxY, jitter) {

  var cx = x;

  ctx.beginPath(); ctx.moveTo(cx, y);

  while (y < maxY) {

    var nx = cx+(Math.random()-0.5)*jitter, ny = y+28+Math.random()*32;

    ctx.lineTo(nx, ny);

    if (Math.random()>0.68 && y < maxY*0.65) {

      ctx.save(); ctx.globalAlpha *= 0.38; ctx.lineWidth = Math.max(0.5,ctx.lineWidth*0.45);

      ctx.beginPath(); ctx.moveTo(nx,ny);

      var bx2=nx+(Math.random()-0.5)*90, by2=ny+35+Math.random()*55;

      ctx.lineTo(bx2,by2); ctx.lineTo(bx2+(Math.random()-0.5)*45,by2+22+Math.random()*28);

      ctx.stroke(); ctx.restore();

      ctx.beginPath(); ctx.moveTo(nx,ny);

    }

    cx=nx; y=ny;

  }

  ctx.stroke();

}



// Resize canvas on window resize

window.addEventListener('resize', function() {

  var canvas = document.getElementById('wx-canvas');

  if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

});



// Fetch on load, refresh every 10 minutes

fetchWeather();

setInterval(fetchWeather, 600000);





</script>
